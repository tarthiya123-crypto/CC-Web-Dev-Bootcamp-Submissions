<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="heading">
        <h1>To Do List <img src="todo.png" alt="Todo" width=40 height=40</h1>
    </div>
    <div class="Header">
        <label for="Task">Enter your task:</label>
        <input type="text" id="Task" required>
        <button onclick="addTask()">Enter</button>
        <div class="outputs">
            <ul id="task_container">
            </ul>
        </div>
    </div>
    <div class="avatar">
        <p>Avatar:</p>
        <img src="whitebear.jpeg" width=90px height=90px>
        <p>Name: T. Arthiya</p>
        <p>Bio:</p>
         <p>USN: 1RV25CS185</p>
         <p>Branch: CSE</p>
         <p>Section:</p>
        <p>Info:</p>
        <ul>
             <li>Add you task in the input bar</li>
             <li>click "Enter" button</li>
             <li>Your checkerbox input appears</li>
             <li>If task completed, strike task</li>
             <li>Click delete button to delete</li>
        </ul>
    </div>
<script src="script.js"></script>
</body>
</html>
